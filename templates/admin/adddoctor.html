


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareSync | Add Doctor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
<link rel="stylesheet" href="/static/shared.css"/>
</head>
<body>
<div id="sidebar-root"></div>
<main class="main">
  <div class="page-header">
    <div>
      <h1>Add New Doctor</h1>
      <p>Register a new medical professional to the system</p>
    </div>
    <a href="/myapp/admin_viewdoctor_get/" class="action-btn back"><i class="bi bi-arrow-left"></i> Back to Doctors</a>
  </div>
<form method="post" enctype="multipart/form-data"> {% csrf_token %}
  <div class="card" style="max-width:800px;">
    <div class="card-header">
      <div><h3>Doctor Information</h3><p>All fields marked with * are required</p></div>
      <i class="bi bi-person-badge-fill" style="font-size:24px;color:var(--teal-light);"></i>
    </div>
    <div class="card-body">

      <div class="form-divider">Personal Details</div>
      <div class="form-grid-2" style="margin-bottom:16px;">
        <div class="form-group">
          <label>Full Name <span class="req">*</span></label>
          <div class="input-group">
            <input type="text" class="form-control" placeholder="e.g. Dr. Meera Nair"  name="name" />
            <i class="bi bi-person input-icon"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Phone Number <span class="req">*</span></label>
          <div class="input-group">
            <input type="tel" class="form-control"  name="phone" placeholder="+91 XXXXX XXXXX"/>
            <i class="bi bi-telephone input-icon"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Email Address <span class="req">*</span></label>
          <div class="input-group">
            <input type="email" class="form-control" name="email" placeholder="doctor@caresync.in"/>
            <i class="bi bi-envelope input-icon"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Date of Birth <span class="req">*</span></label>
          <div class="input-group">
            <input type="date" class="form-control" name="dob"/>
            <i class="bi bi-calendar3 input-icon"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Gender <span class="req">*</span></label>
          <select class="form-control" name="gender">
            <option value="" disabled selected>Select gender</option>
            <option>Male</option><option>Female</option><option>Other</option>
          </select>
        </div>
      </div>

      <div class="form-divider">Professional Details</div>
      <div class="form-grid-2" style="margin-bottom:16px;">
        <div class="form-group">
          <label>Department <span class="req">*</span></label>
          <select class="form-control" name="department">
            <option value="" disabled selected>Select department</option>
            <option>Cardiology</option><option>Orthopaedics</option>
            <option>Neurology</option><option>Gynaecology</option>
            <option>Paediatrics</option><option>General Medicine</option>
          </select>
        </div>
        <div class="form-group">
          <label>Qualification <span class="req">*</span></label>
          <input type="text" class="form-control"  name="qualification" placeholder="e.g. MD, MS, DM"/>
        </div>
        <div class="form-group">
          <label>Doctor Profile Image</label>
          <div class="input-group">
            <input type="file" class="form-control" name="profile_image" accept="image/*"/>
            <i class="bi bi-image input-icon"></i>
          </div>
        </div>
      </div>

      <div class="form-divider">Address</div>
      <div class="form-grid-3" style="margin-bottom:16px;">
        <div class="form-group" style="grid-column:1/3;">
          <label>Place / Street <span class="req">*</span></label>
          <input type="text" class="form-control" name="place" placeholder="Street address"/>
        </div>
        <div class="form-group">
          <label>Post</label>
          <input type="text" class="form-control" name="post" placeholder="Post office"/>
        </div>
        <div class="form-group">
          <label>PIN Code <span class="req">*</span></label>
          <input type="number" class="form-control" name="pincode" placeholder="6-digit PIN"/>
        </div>
        <div class="form-group">
          <label>District <span class="req">*</span></label>
          <input type="text" class="form-control" name="district" placeholder="District"/>
        </div>
      </div>

      <div class="form-divider">Account Credentials</div>
      <div class="form-grid-2">
        <div class="form-group">
          <label>Username <span class="req">*</span></label>
          <div class="input-group" >
            <span class="input-prefix">@</span>
            <input type="text" class="form-control" name="username" placeholder="unique_username"/>
          </div>
        </div>
        <div class="form-group">
          <label>Password <span class="req">*</span></label>
          <div class="input-group">
            <input type="password" class="form-control" name="password" placeholder="Strong password"/>
            <i class="bi bi-lock input-icon"></i>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-submit"><i class="bi bi-check2-circle"></i> Add Doctor</button>
        <a href="/myapp/admin_viewdoctor_get/"><button type="button" class="btn-cancel">Cancel</button></a>
      </div>
    </div>
  </div>
  </form>
</main>
<script src="/static/sidebar.js"></script>
<script>document.getElementById('sidebar-root').innerHTML = renderSidebar('viewdoctor');</script>
</body>
</html>
