<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareSync | Schedules</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
<link rel="stylesheet" href="/static/shared.css"/>
<style>
.time-chip { display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:12.5px;font-weight:600;background:var(--teal-pale);color:var(--teal); }
</style>
</head>
<body>
<div id="sidebar-root"></div>
<main class="main">
  <div class="page-header">
    <div>
      <h1>Doctor Schedules</h1>
      <p>Manage all doctor appointment time slots</p>
    </div>
    <a href="/myapp/admin_addschedule_get/" class="btn-primary"><i class="bi bi-plus-circle"></i> Add Schedule</a>
  </div>
<form method="post"> {% csrf_token %}

  <div class="card">
    <div class="table-toolbar">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text" placeholder="Search by doctor or date…"/>
      </div>
      <input type="date" class="form-control" style="width:auto;padding:9px 14px;font-size:13px;"/>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Doctor</th><th>Date</th><th>From</th><th>To</th><th>Actions</th></tr>
        </thead>
        <tbody>
          {% for i in data %}
          <tr>
            <td><div style="display:flex;align-items:center"><span class="row-avatar"></span><strong>{{ i.DOCTOR.name }}</strong></div></td>
            <td>{{ i.date }}</td>
            <td><span class="time-chip"><i class="bi bi-clock"></i>{{ i.from_time }}</span></td>
            <td><span class="time-chip"><i class="bi bi-clock-fill"></i>{{ i.to_time }}</span></td>
            <!-- <td><span class="badge badge-active">6 slots</span></td> -->
            <td><div style="display:flex;gap:7px;">
              <a href="/myapp/admin_editschedule_get/" class="action-btn edit"><i class="bi bi-pencil"></i> Edit</a>
              <a href="#" class="action-btn delete"><i class="bi bi-trash"></i> Delete</a>
            </div></td>
          </tr> 
          {% endfor %}

        </tbody>
      </table>
    </div>
  </div>
</form>
</main>
<script src="/static/sidebar.js"></script>
<script>document.getElementById('sidebar-root').innerHTML = renderSidebar('viewschedule');</script>
</body>
</html>
