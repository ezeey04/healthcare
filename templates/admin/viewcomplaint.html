<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareSync | Complaints</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
<link rel="stylesheet" href="/static/shared.css"/>
<style>
.complaint-text { max-width: 340px; font-size: 13px; color: var(--muted); line-height: 1.5; white-space: normal; }
</style>
</head>
<body>
<div id="sidebar-root"></div>
<main class="main">
  <div class="page-header">
    <div>
      <h1>Patient Complaints</h1>
      <p>Review and respond to patient feedback and concerns</p>
    </div>
    <span class="badge badge-pending" style="font-size:13px;padding:9px 18px;">7 Unanswered</span>
  </div>
<form method="post"> {% csrf_token %}

  <div class="card">
    <div class="table-toolbar">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text" placeholder="Search complaints…"/>
      </div>
      <select class="form-control" style="width:auto;padding:9px 34px 9px 12px;font-size:13px;">
        <option>All</option><option>Pending</option><option>Replied</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Patient</th><th>Complaint</th><th>Date</th><th>Status</th><th>Action</th></tr>
        </thead>
        <tbody>
          {% for i in data %}
          <tr>
            <td><div style="display:flex;align-items:center"><span class="row-avatar"></span><strong>{{ i.USER.name }}</strong></div></td>
            <td><div class="complaint-text">{{ i.complaint }}</div></td>
            <td>{{ i.date }}</td>
            <td><span class="badge badge-pending">{{ i.status }}</span></td>
            <td><a href="/myapp/admin_sendreply_get/" class="action-btn reply"><i class="bi bi-reply-fill"></i> Reply</a></td>
          </tr>
          {% endfor %}

        </tbody>
      </table>
    </div>
  </div>
</form>
</main>
<script src="/static/sidebar.js"></script>
<script>document.getElementById('sidebar-root').innerHTML = renderSidebar('complaints');</script>
</body>
</html>
