<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareSync | Add Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
<link rel="stylesheet" href="/static/shared.css"/>
<style>
.info-box { background:var(--teal-pale); border:1px solid var(--teal-mid); border-radius:10px; padding:14px 18px; display:flex; gap:12px; align-items:flex-start; margin-bottom:22px; }
.info-box i { color:var(--teal); font-size:17px; margin-top:1px; flex-shrink:0; }
.info-box p { font-size:13px; color:var(--teal); line-height:1.5; }
</style>
</head>
<body>
<div id="sidebar-root"></div>
<main class="main">
  <div class="page-header">
    <div>
      <h1>Add Schedule</h1>
      <p>Assign a new appointment time slot for a doctor</p>
    </div>
    <a href="/myapp/admin_viewschedule_get/" class="action-btn back"><i class="bi bi-arrow-left"></i> Back to Schedules</a>
  </div>
<form method="post"> {% csrf_token %}
  <div class="card" style="max-width:580px;">
    <div class="card-header">
      <div><h3>Schedule Details</h3><p>Set date and available hours for the doctor</p></div>
      <i class="bi bi-calendar-plus" style="font-size:22px;color:var(--teal-light);"></i>
    </div>
    <div class="card-body">
      <div class="info-box">
        <i class="bi bi-info-circle-fill"></i>
        <p>Schedules define when a doctor is available for patient bookings. Each 30-minute slot within the time range becomes bookable.</p>
      </div>

      <div style="display:flex;flex-direction:column;gap:20px;">
        <div class="form-group">
          <label>Select Doctor <span class="req">*</span></label>
          <select class="form-control" name="did">
            <option value="" disabled selected>Choose a doctor</option>
            
      {% for i in data %}
      <option value="{{ i.id }}">{{ i.name }}</option>
      {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Date <span class="req">*</span></label>
          <div class="input-group">
            <input type="date" class="form-control" name="date"/>
            <i class="bi bi-calendar3 input-icon"></i>
          </div>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label>From Time <span class="req">*</span></label>
            <div class="input-group">
              <input type="time" class="form-control" name="fromtime"/>
              <i class="bi bi-clock input-icon"></i>
            </div>
          </div>
          <div class="form-group">
            <label>To Time <span class="req">*</span></label>
            <div class="input-group">
              <input type="time" class="form-control" name="totime"/>
              <i class="bi bi-clock-fill input-icon"></i>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-submit" type="submit"><i class="bi bi-plus-circle"></i> Add Schedule</button>
        <a href="/myapp/admin_viewschedule_get/"><button type="button" class="btn-cancel">Cancel</button></a>
      </div>
    </div>
  </div>
  </form>
</main>
<script src="/static/sidebar.js"></script>
<script>document.getElementById('sidebar-root').innerHTML = renderSidebar('viewschedule');</script>
</body>
</html>
