<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareSync | Edit Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
<link rel="stylesheet" href="/static/shared.css"/>
</head>
<body>
<div id="sidebar-root"></div>
<main class="main">
  <div class="page-header">
    <div>
      <h1>Edit Schedule</h1>
      <p>Modify an existing appointment slot</p>
    </div>
    <a href="view_schedules.html" class="action-btn back"><i class="bi bi-arrow-left"></i> Back to Schedules</a>
  </div>
<form method="post"> {% csrf_token %}

  <div class="card" style="max-width:580px;">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:14px;">
        <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--teal-light),var(--teal));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;flex-shrink:0;">MN</div>
        <div><h3>Dr. Meera Nair</h3><p>Cardiology · Schedule #SCH-0018</p></div>
      </div>
      <span class="badge badge-active">Active</span>
    </div>
    <div class="card-body">
      <div style="display:flex;flex-direction:column;gap:20px;">
        <div class="form-group">
          <label>Date</label>
          <div class="input-group">
            <input type="date" class="form-control" name="date" value="2025-04-01"/>
            <i class="bi bi-calendar3 input-icon"></i>
          </div>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label>From Time</label>
            <div class="input-group">
              <input type="time" class="form-control" name="fromtime" value="09:00"/>
              <i class="bi bi-clock input-icon"></i>
            </div>
          </div>
          <div class="form-group">
            <label>To Time</label>
            <div class="input-group">
              <input type="time" class="form-control" name="totime" value="12:00"/>
              <i class="bi bi-clock-fill input-icon"></i>
            </div>
          </div>
        </div>

        <div style="background:var(--cream);border-radius:10px;padding:14px 18px;border:1px solid var(--border);">
          <p style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;">Slot Summary</p>
          <p style="font-size:13.5px;color:var(--navy);">6 × 30-minute slots · 09:00 AM to 12:00 PM</p>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-submit"><i class="bi bi-check2-circle"></i> Update Schedule</button>
        <a href="/myapp/viewschedule_get/"><button type="button" class="btn-cancel">Cancel</button></a>
      </div>
    </div>
  </div>
</form>
</main>
<script src="/static/sidebar.js"></script>
<script>document.getElementById('sidebar-root').innerHTML = renderSidebar('viewschedule');</script>
</body>
</html>
