<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareSync | Edit Doctor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
<link rel="stylesheet" href="/static/shared.css"/>
</head>
<body>
<div id="sidebar-root"></div>
<main class="main">
  <div class="page-header">
    <div>
      <h1>Edit Doctor</h1>
      <p>Update the details</p>
    </div>
    <a href="/myapp/admin_viewdoctor_get/" class="action-btn back"><i class="bi bi-arrow-left"></i> Back to Doctors</a>
  </div>
<form method="post"> {% csrf_token %}

  <div class="card" style="max-width:800px;">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:14px;">
        <div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--teal-light),var(--teal));display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;flex-shrink:0;">MN</div>
        <div><h3></h3><p>Cardiology · ID #DOC-0042</p></div>
      </div>
      <span class="badge badge-active">Active</span>
    </div>
    <div class="card-body">

      <div class="form-divider">Personal Details</div>
      <div class="form-grid-2" style="margin-bottom:16px;">
        <div class="form-group">
          <label>Full Name</label>
          <div class="input-group">
            <input type="text" class="form-control"  name="name" value="{{ data.name }}"/>
            <i class="bi bi-person input-icon"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <div class="input-group">
            <input type="tel" class="form-control" name="phone" value="{{ data.phone }}"/>
            <i class="bi bi-telephone input-icon"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-group">
            <input type="email" class="form-control" name="email" value="{{ data.email }}"/>
            <i class="bi bi-envelope input-icon"></i>
          </div>
        </div>
        <div class="form-group">
  <label>Date of Birth</label>
  <div class="input-group">
    <input type="date" class="form-control" name="dob" 
           value="{{ data.dob|date:'Y-m-d' }}"/>
    <i class="bi bi-calendar3 input-icon"></i>
  </div>
</div>
   <div class="form-group">
  <label>Gender</label>
  <select class="form-control" name="gender">
    <option value="Female">Female</option>
    <option value="Male">Male</option>
    <option value="Other">Other</option>
  </select>
</div>

     <div class="form-group">
  <label>Department</label>
  <select class="form-control" name="department">
    <option value="Cardiology">Cardiology</option>
    <option value="Orthopaedics">Orthopaedics</option>
    <option value="Neurology">Neurology</option>
    <option value="General Medicine">General Medicine</option>
  </select>
</div>
        <div class="form-group">
          <label>Qualification</label>
          <input type="text" class="form-control" name="qualification" value="{{ data.qualification }}"/>
        </div>
      </div>

      <div class="form-divider">Address</div>
      <div class="form-grid-3" style="margin-bottom:16px;">
        <div class="form-group" style="grid-column:1/3;">
          <label>Place / Street</label>
          <input type="text" class="form-control" name="place" value="{{ data.place }}"/>
        </div>
        <div class="form-group">
          <label>Post</label>
          <input type="text" class="form-control" name="post" value="{{ data.post }}"/>
        </div>
        <div class="form-group">
          <label>PIN Code</label>
          <input type="number" name="pincode" class="form-control" value="{{ data.pin }}"/>
        </div>
        <div class="form-group">
          <label>District</label>
          <input type="text" name="district" class="form-control" value="{{ data.district }}"/>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-submit"><i class="bi bi-check2-circle"></i> Update Doctor</button>
        <a href="view_doctors.html"><button type="button" class="btn-cancel">Cancel</button></a>
      </div>
    </div>
  </div>
  </form>
</main>
<script src="/static/sidebar.js"></script>
<script>document.getElementById('sidebar-root').innerHTML = renderSidebar('viewdoctor');</script>
</body>
</html>
