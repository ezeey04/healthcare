<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a3a5c;
            --primary-light: #2a5298;
            --accent: #17a589;
            --accent-light: #e8f8f5;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #1a2533;
            --muted: #6b7a8d;
            --border: #d8e2ec;
            --shadow: 0 4px 24px rgba(26,58,92,0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        nav {
            background: var(--primary);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            box-shadow: 0 2px 12px rgba(26,58,92,0.18);
        }
        .nav-brand {
            font-family: 'Playfair Display', serif;
            color: #fff;
            font-size: 1.25rem;
            text-decoration: none;
        }
        .nav-brand span { color: #5dade2; }
        .nav-links { display: flex; gap: 0.25rem; }
        .nav-links a {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            padding: 0.45rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }
        .page-wrapper { max-width: 1000px; margin: 2.5rem auto; padding: 0 1.5rem; }
        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--primary);
            font-weight: 500;
        }
        .page-header p {
            color: var(--muted);
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }
        .search-bar {
            display: flex;
            gap: 0.5rem;
        }
        .search-input {
            padding: 0.55rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            color: var(--text);
            outline: none;
            background: #fff;
            width: 220px;
        }
        .search-input:focus { border-color: var(--accent); }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background: #f7fafc;
            border-bottom: 1.5px solid var(--border);
        }
        thead th {
            padding: 0.85rem 1.25rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f7fafc; }
        tbody td {
            padding: 1rem 1.25rem;
            font-size: 0.9rem;
            color: var(--text);
            vertical-align: middle;
        }
        .user-cell {
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }
        .avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 0.78rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        .user-name { font-weight: 500; }
        .badge {
            display: inline-block;
            padding: 0.28rem 0.75rem;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
        }
        .badge-confirmed { background: var(--accent-light); color: #0e8a72; }
        .badge-pending { background: #fef9e7; color: #b7950b; }
        .badge-cancelled { background: #fef0ef; color: #c0392b; }
        .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.4rem 0.9rem;
            background: #f0f4f8;
            color: var(--primary);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .link-btn:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--muted);
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .empty-state p { font-size: 0.9rem; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="nav-brand">Medi<span>Portal</span></a>
    <div class="nav-links">
        <a href="/myapp/doctor_home_get/">Home</a>
        <a href="/myapp/doctor_viewschedule_get/" class="active">Schedule</a>
        <a href="/myapp/logout_get/">Log Out</a>
    </div>
</nav>

<div class="page-wrapper">
    <div class="page-header">
        <div>
            <h1>Bookings</h1>
            <p>All patient appointments for this schedule slot.</p>
        </div>
        <div class="search-bar">
            <input type="text" class="search-input" placeholder="Search patient...">
        </div>
    </div>

    <div class="card">
        <form method="post">
            {% csrf_token %}
            <table>
                <thead>
                    <tr>
                        <th>Patient</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Prescription</th>
                    </tr>
                </thead>
                <tbody>
                {% for i in data %}
                    <tr>
                        <td>
                            <div class="user-cell">
                                <div class="user-name">{{ i.USER.name }}<br>{{ i.USER.phone }}</div>
                            </div>
                        </td>
                        <td>{{ i.date }}</td>
                        <td><span class="badge badge-confirmed">{{ i.status }}</span></td>
                        <td>
                            
                               <a href="/myapp/doctor_addprescription_get/{{ i.id }}/"class="link-btn">
            Add Prescription
        </a>
                            
                            <a href="/myapp/doctor_viewprescription_get/{{ i.id }}" class="link-btn">View &rarr;</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </form>
    </div>
</div>

</body>
</html>
