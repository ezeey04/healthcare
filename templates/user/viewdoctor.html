<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareSync | Find Doctors</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
<link rel="stylesheet" href="/static/user_shared.css"/>
<style>
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 14px 16px;
  text-align: left;
  vertical-align: middle;
  border-bottom: 1px solid #f0f0f0;
}
th {
  font-weight: 600;
  color: var(--navy, #1a202c);
  background-color: #f8fafc;
}
.dept-chip { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:600; background:var(--teal-pale, #e6f6f5); color:var(--teal, #0d9488); }
.doctor-cell { display:flex; align-items:center; gap:12px; }
.doc-avatar,
.doc-avatar-img { width:44px; height:44px; border-radius:50%; flex-shrink:0; }
.doc-avatar { background:linear-gradient(135deg,var(--teal-light, #2dd4bf),var(--teal, #0f766e)); display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700; }
.doc-avatar-img { object-fit:cover; border:1px solid var(--border); }
.doc-name strong { font-size:13.5px; font-weight:600; color:var(--navy, #1e293b); display:block; }
.doc-name span { font-size:12px; color:var(--muted, #64748b); }
</style>
</head>
<body>
<div id="sidebar-root"></div>
<main class="main">

  <div class="page-header">
    <div>
      <h1>Find a Doctor</h1>
      <p>Browse available specialists and book an appointment</p>
    </div>
  </div>

  <div class="card">
    <div class="table-toolbar">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text" id="searchInput" placeholder="Search by name or department..."/>
      </div>
      <select id="deptFilter" class="form-control" style="width:auto;padding:9px 34px 9px 12px;font-size:13px;">
        <option value="" disabled selected>Select department</option>
        <option>Cardiology</option><option>Orthopaedics</option>
        <option>Neurology</option><option>Gynaecology</option>
        <option>Paediatrics</option><option>General Medicine</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Doctor</th>
            <th>Department</th>
            <th>Schedule</th>
          </tr>
        </thead>
        <tbody id="doctorTableBody">
          {% for i in data %}
          <tr class="doctor-row">
            <td class="si-no">{{ forloop.counter }}</td>
            <td>
              <div class="doctor-cell">
                {% if i.profile_image %}
                <img src="{{ i.profile_image.url }}" alt="{{ i.name }}" class="doc-avatar-img">
                {% else %}
                <div class="doc-avatar">{{ i.name|slice:":2"|upper }}</div>
                {% endif %}
                <div class="doc-name">
                  <strong class="search-name">{{ i.name }}</strong>
                  <span>{{ i.qualification }}</span>
                </div>
              </div>
            </td>
            <td><span class="dept-chip search-dept">{{ i.department }}</span></td>
            <td><a href="/myapp/user_viewschedule_get/{{i.id}}" class="action-btn view"><i class="bi bi-calendar3"></i> Schedules</a></td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>

</main>
<script src="/static/user_sidebar.js"></script>
<script>document.getElementById('sidebar-root').innerHTML = renderUserSidebar('viewdoctor');</script>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const searchInput = document.getElementById("searchInput");
    const deptFilter = document.getElementById("deptFilter");
    const tableBody = document.getElementById("doctorTableBody");
    const rows = tableBody.getElementsByClassName("doctor-row");

    function filterTable() {
      const searchQuery = searchInput.value.toLowerCase().trim();
      const selectedDept = deptFilter.value.toLowerCase();

      Array.from(rows).forEach(row => {
        const docName = row.querySelector(".search-name").textContent.toLowerCase();
        const docDept = row.querySelector(".search-dept").textContent.toLowerCase();
        const matchesSearch = docName.includes(searchQuery) || docDept.includes(searchQuery);
        const matchesDropdown = selectedDept === "" || selectedDept === "all" || docDept === selectedDept;

        if (matchesSearch && matchesDropdown) {
          row.style.display = "";
        } else {
          row.style.display = "none";
        }
      });
    }

    searchInput.addEventListener("input", filterTable);
    deptFilter.addEventListener("change", filterTable);
  });
</script>
</body>
</html>
