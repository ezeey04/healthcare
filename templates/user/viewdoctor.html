<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareSync | Find Doctors</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
<link rel="stylesheet" href="/static/user_shared.css"/>
<style>
.dept-chip { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:600; background:var(--teal-pale); color:var(--teal); }
.doctor-cell { display:flex; align-items:center; gap:10px; }
.doc-avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--teal-light),var(--teal)); display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700; flex-shrink:0; }
.doc-name strong { font-size:13.5px; font-weight:600; color:var(--navy); display:block; }
.doc-name span { font-size:12px; color:var(--muted); }
.addr-cell { font-size:13px; color:var(--muted); max-width:180px; }
.contact-cell { font-size:13px; }
.contact-cell p { color:var(--navy); font-weight:500; }
.contact-cell span { color:var(--muted); font-size:12px; }
</style>
</head>
<body>
<div id="sidebar-root"></div>
<main class="main">

  <div class="page-header">
    <div>
      <h1>Find a Doctor</h1>
      <p>Browse available specialists and book an appointment</p>
    </div>
  </div>

  <div class="card">
    <div class="table-toolbar">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text" placeholder="Search by name or department…"/>
      </div>
      <select class="form-control" style="width:auto;padding:9px 34px 9px 12px;font-size:13px;">
        <option>All Departments</option>
        <option>Cardiology</option><option>Orthopaedics</option>
        <option>Neurology</option><option>Paediatrics</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Doctor</th>
            <th>Department</th>
            <th>Address</th>
            <th>Contact</th>
            <th>Schedule</th>
          </tr>
        </thead>
        <tbody>
          {% for i in data %}
          <tr>
            <td class="si-no">{{ i.id }}</td>
            <td>
              <div class="doctor-cell">
                <div class="doc-avatar">MN</div>
                <div class="doc-name">
                  <strong>{{ i.name }}</strong>
                  <span>{{ i.degree }}</span>
                </div>
              </div>
            </td>
            <td><span class="dept-chip">{{ i.department }}</span></td>
            <td class="addr-cell">{{ i.address }}</td>
            <td class="contact-cell">
              <p>{{ i.phone }}</p>
              <span>{{ i.email }}</span>
            </td>
            <td><a href="/myapp/user_viewschedule_get/{{i.id}}" class="action-btn view"><i class="bi bi-calendar3"></i> Schedules</a></td>
          </tr>
      {% endfor %}
        </tbody>
      </table>
    </div>
  </div>

</main>
<script src="/static/user_sidebar.js"></script>
<script>document.getElementById('sidebar-root').innerHTML = renderUserSidebar('viewdoctor');</script>
</body>
</html>
